<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>XMLShield — Tests de regresión</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Harness de desarrollo — NO se distribuye. El producto es solo index.html */
  body {
    font: 15px system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1rem;
    background: #16213e;
    color: #ddd;
  }
  h1 { font-size: 1.4rem; }
  .note { color: #9ab; font-size: 0.85rem; }
  #summary {
    font-size: 1.1rem;
    font-weight: 700;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    margin: 1rem 0;
  }
  #summary.ok   { background: #0aa15b33; color: #4ade80; }
  #summary.fail { background: #b0000033; color: #f87171; }
  table { border-collapse: collapse; width: 100%; }
  td, th { padding: 0.4rem 0.6rem; border-bottom: 1px solid #333; text-align: left; vertical-align: top; }
  .pass { color: #4ade80; }
  .fail { color: #f87171; }
  .err  { font: 12px ui-monospace, Consolas, monospace; color: #fca5a5; white-space: pre-wrap; }
  code { background: #ffffff14; padding: 0.1rem 0.3rem; border-radius: 4px; }
</style>
</head>
<body>
<h1>🧪 XMLShield — Tests de regresión</h1>
<p class="note">
  Carga <code>index.html</code> en un iframe y ejercita la API <code>window.XMLShield</code>.
  Requiere servirse por HTTP (ej. <code>python -m http.server</code>) — con <code>file://</code>
  Chrome bloquea el acceso al iframe.
</p>
<div id="summary">Cargando index.html…</div>
<table id="results"></table>
<iframe id="app" src="index.html" style="display:none"></iframe>

<script>
(function(){
  const tests = [];
  function test(name, fn){ tests.push({ name, fn }); }

  function assertEq(actual, expected, msg = ""){
    if (actual !== expected)
      throw new Error(`${msg}\nesperado: ${JSON.stringify(expected)}\nrecibido: ${JSON.stringify(actual)}`);
  }
  function assertTrue(cond, msg = "condición falsa"){
    if (!cond) throw new Error(msg);
  }
  function assertThrows(fn, pattern, msg = "debía lanzar error"){
    try { fn(); } catch(e){
      assertTrue(pattern.test(e.message), `mensaje de error inesperado: ${e.message}`);
      return;
    }
    throw new Error(msg);
  }

  const wait = ms => new Promise(r => setTimeout(r, ms));

  // ============================================================
  // Definición de tests. X = window.XMLShield del iframe,
  // idoc/iwin = document y window del iframe (para tests de UI)
  // ============================================================
  function defineTests(X, idoc, iwin){

    // --- prettyFormat ---
    test("prettyFormat: formatea con sangría de 2 espacios", () => {
      assertEq(X.prettyFormat("<a><b>x</b></a>", "  "), "<a>\n  <b>x</b>\n</a>\n");
    });

    test("prettyFormat: formatea con tabs", () => {
      assertEq(X.prettyFormat("<a><b>x</b></a>", "\t"), "<a>\n\t<b>x</b>\n</a>\n");
    });

    test("prettyFormat: conserva la declaración XML sin duplicarla (regresión v2.4 bug #1)", () => {
      const out = X.prettyFormat('<?xml version="1.0" encoding="UTF-8"?><a/>', "  ");
      assertTrue(out.startsWith('<?xml version="1.0" encoding="UTF-8"?>'), "la declaración XML se perdió");
      assertEq((out.match(/<\?xml\s/g) || []).length, 1, "declaración duplicada");
    });

    test("prettyFormat: conserva comentarios top-level (regresión v2.4 bug #1)", () => {
      const out = X.prettyFormat("<!-- licencia --><a/>", "  ");
      assertTrue(out.includes("<!-- licencia -->"), "el comentario top-level se perdió");
    });

    test("prettyFormat: autocierra elementos vacíos", () => {
      assertEq(X.prettyFormat("<a></a>", "  "), "<a/>\n");
    });

    test("prettyFormat: normaliza espacios en texto por defecto", () => {
      assertEq(X.prettyFormat("<a>  x   y  </a>", "  "), "<a>x y</a>\n");
    });

    test("prettyFormat: preserveWhitespace mantiene el texto intacto", () => {
      assertEq(X.prettyFormat("<a>  x  </a>", "  ", true), "<a>  x  </a>\n");
    });

    test("prettyFormat: conserva CDATA", () => {
      const out = X.prettyFormat("<a><![CDATA[1 < 2]]></a>", "  ");
      assertTrue(out.includes("<![CDATA[1 < 2]]>"), "CDATA alterado o perdido");
    });

    test("prettyFormat: conserva atributos", () => {
      assertEq(X.prettyFormat('<a b="1" c="2"/>', "  "), '<a b="1" c="2"/>\n');
    });

    test("prettyFormat: XML inválido lanza error descriptivo", () => {
      assertThrows(() => X.prettyFormat("<a><b></a>", "  "), /línea \d+|inválido/i);
    });

    // --- minify ---
    const MIN = { keepTextWS: true, compactAttrs: true };

    test("minify: colapsa espacios entre tags", () => {
      assertEq(X.minify("<a>\n  <b/>\n  <c/>\n</a>", MIN), "<a><b/><c/></a>");
    });

    test("minify: no toca texto con '=' (regresión v2.4 bug #3)", () => {
      assertEq(X.minify("<a>x = y</a>", MIN), "<a>x = y</a>");
    });

    test("minify: no toca el contenido de CDATA (regresión v2.4 bug #3)", () => {
      assertEq(
        X.minify("<a><![CDATA[1 >  < 2 = 3]]></a>", MIN),
        "<a><![CDATA[1 >  < 2 = 3]]></a>"
      );
    });

    test("minify: no toca el contenido de comentarios (regresión v2.4 bug #3)", () => {
      assertEq(
        X.minify("<a><!-- x  =  y --></a>", MIN),
        "<a><!-- x  =  y --></a>"
      );
    });

    test("minify: conserva la declaración XML sin duplicarla (regresión v2.4 bug #1)", () => {
      assertEq(
        X.minify('<?xml version="1.0"?>\n<a/>', MIN),
        '<?xml version="1.0"?><a/>'
      );
    });

    test("minify: keepTextWS=false normaliza espacios del texto", () => {
      assertEq(
        X.minify("<a>  x   y  </a>", { keepTextWS: false, compactAttrs: false }),
        "<a>x y</a>"
      );
    });

    test("minify: normaliza espacios alrededor de '=' en atributos", () => {
      assertEq(X.minify('<a  b = "1" />', MIN), '<a b="1"/>');
    });

    test("minify: XML inválido lanza error descriptivo", () => {
      assertThrows(() => X.minify("<a><b></a>", MIN), /línea \d+|inválido/i);
    });

    // --- xmlToJson (lee la sangría de los controles del iframe) ---
    test("xmlToJson: atributos con prefijo @", () => {
      const obj = JSON.parse(X.xmlToJson('<a b="1"><c>x</c></a>'));
      assertEq(obj.a["@b"], "1");
      assertEq(obj.a.c, "x");
    });

    test("xmlToJson: elementos repetidos agrupados en array", () => {
      const obj = JSON.parse(X.xmlToJson("<a><b>1</b><b>2</b></a>"));
      assertTrue(Array.isArray(obj.a.b), "no es array");
      assertEq(obj.a.b.length, 2);
      assertEq(obj.a.b[1], "2");
    });

    test("xmlToJson: texto mixto como #text", () => {
      const obj = JSON.parse(X.xmlToJson('<a b="1">hola</a>'));
      assertEq(obj.a["#text"], "hola");
      assertEq(obj.a["@b"], "1");
    });

    test("xmlToJson: hoja de solo texto es string directo", () => {
      const obj = JSON.parse(X.xmlToJson("<a>x</a>"));
      assertEq(obj.a, "x");
    });

    // --- jsonToXml ---
    test("jsonToXml: estructura básica con atributos", () => {
      assertEq(
        X.jsonToXml('{"a":{"@b":"1","c":"x"}}'),
        '<a b="1">\n  <c>x</c>\n</a>'
      );
    });

    test("jsonToXml: arrays repiten el elemento", () => {
      const out = X.jsonToXml('{"a":{"b":["1","2"]}}');
      assertTrue(out.includes("<b>1</b>") && out.includes("<b>2</b>"), "faltan elementos repetidos");
    });

    test("jsonToXml: escapa & < > \" en texto y atributos", () => {
      const out = X.jsonToXml('{"a":{"@b":"x<&\\"","#text":"1<2&"}}');
      assertTrue(out.includes('b="x&lt;&amp;&quot;"'), "atributo sin escapar: " + out);
      assertTrue(out.includes("1&lt;2&amp;"), "texto sin escapar: " + out);
    });

    test("jsonToXml: múltiples claves raíz se envuelven en <root>", () => {
      const out = X.jsonToXml('{"a":"1","b":"2"}');
      assertTrue(out.startsWith("<root>") && out.endsWith("</root>"), "no envuelto en root: " + out);
    });

    test("jsonToXml: JSON inválido lanza error descriptivo", () => {
      assertThrows(() => X.jsonToXml("{ rotura"), /JSON inválido/i);
    });

    // --- Roundtrip XML → JSON → XML ---
    test("roundtrip: XML→JSON→XML equivale al original (canonicalizado)", () => {
      const xml = '<catalog t="2"><b id="1">x</b><b id="2">y</b><tags><t>a</t><t>b</t></tags></catalog>';
      const back = X.jsonToXml(X.xmlToJson(xml));
      const canon = s => X.minify(s, { keepTextWS: false, compactAttrs: true });
      assertEq(canon(back), canon(xml));
    });

    // --- highlightXML ---
    test("highlightXML: colorea el nombre de tags CON atributos (regresión v2.4 bug #2)", () => {
      const h = X.highlightXML('<a b="1">x</a>');
      assertTrue(h.includes('<span class="tag">a</span>'), "tag sin colorear: " + h);
      assertTrue(h.includes('<span class="attr">b</span>'), "atributo sin colorear: " + h);
    });

    test("highlightXML: colorea comentarios", () => {
      assertTrue(X.highlightXML("<!-- hi -->").includes('class="comment"'));
    });

    test("highlightXML: escapa HTML del contenido", () => {
      assertTrue(X.highlightXML("<a>1 & 2</a>").includes("1 &amp; 2"));
    });

    // --- asEscapedString ---
    test("asEscapedString: js produce string JSON válido", () => {
      assertEq(X.asEscapedString('a\n"b"', "js"), JSON.stringify('a\n"b"'));
    });

    test("asEscapedString: python produce string con escapes", () => {
      assertEq(X.asEscapedString("x\ny", "python"), '"x\\ny"');
    });

    test("asEscapedString: java concatena línea a línea", () => {
      assertEq(X.asEscapedString("l1\nl2", "java"), '"l1\\n" +\n"l2"');
    });

    test("asEscapedString: plain devuelve el texto tal cual", () => {
      assertEq(X.asEscapedString("x\ny", "plain"), "x\ny");
    });

    // --- buildTreeHTML ---
    test("buildTreeHTML: genera <details> colapsable para XML válido", () => {
      const t = X.buildTreeHTML("<a><b>x</b></a>");
      assertTrue(t.includes("<details") && t.includes('class="tag'), "árbol incompleto: " + t);
    });

    // --- v2.7: árbol interactivo ---
    test("buildTreeHTML: rutas XPath con índice solo para hermanos repetidos", () => {
      const t = X.buildTreeHTML("<r><i>1</i><i>2</i><u/></r>");
      assertTrue(t.includes('data-xp="/r/i[2]"'), "falta índice en repetidos: " + t);
      assertTrue(t.includes('data-xp="/r/u"'), "índice de más en único: " + t);
    });

    test("buildTreeHTML: contador de hijos en nodos con elementos", () => {
      assertTrue(X.buildTreeHTML("<r><a/><b/></r>").includes("2 hijo"), "sin contador");
    });

    // --- v2.7: KPIs legibles ---
    test("fmtBytes: B, KB y MB legibles", () => {
      assertEq(X.fmtBytes(512), "512 B");
      assertEq(X.fmtBytes(2048), "2.0 KB");
      assertEq(X.fmtBytes(3 * 1024 * 1024), "3.0 MB");
    });

    test("buildTreeHTML: salida no parseable muestra aviso en vez de romper", () => {
      assertTrue(X.buildTreeHTML("esto no es xml ni json").includes("⚠️"));
    });

    // --- v2.8: JSON de primera clase ---
    test("highlightJSON: claves, strings, números y booleanos con clases distintas", () => {
      const h = X.highlightJSON('{"clave": "texto", "n": 42, "ok": true, "nada": null}');
      assertTrue(h.includes('<span class="attr">&quot;clave&quot;</span>'), "clave sin .attr: " + h);
      assertTrue(h.includes('<span class="value">&quot;texto&quot;</span>'), "string sin .value: " + h);
      assertTrue(h.includes('<span class="tag">42</span>'), "número sin .tag: " + h);
      assertTrue(h.includes('<span class="comment">true</span>'), "booleano sin .comment: " + h);
      assertTrue(h.includes('<span class="comment">null</span>'), "null sin .comment: " + h);
    });

    test("highlightJSON: escapa HTML y respeta comillas escapadas", () => {
      const h = X.highlightJSON('{"a": "<b> \\" &"}');
      assertTrue(h.includes("&lt;b&gt;"), "HTML sin escapar: " + h);
      assertTrue(!h.includes("<b>"), "HTML crudo presente");
    });

    test("buildTreeHTML: objeto JSON como árbol con contador de claves", () => {
      const t = X.buildTreeHTML('{"a": 1, "b": {"c": "x"}}');
      assertTrue(t.includes("<details"), "sin details: " + t);
      assertTrue(t.includes("2 clave(s)"), "sin contador: " + t);
      assertTrue(/class="attr[^"]*"[^>]*>a<\/span>/.test(t), "clave sin estilo: " + t);
    });

    test("buildTreeHTML: array JSON con contador de elementos", () => {
      const t = X.buildTreeHTML('[1, 2, 3]');
      assertTrue(t.includes("3 elemento(s)"), "sin contador de array: " + t);
    });

    test("buildTreeHTML: JSON inválido muestra aviso", () => {
      assertTrue(X.buildTreeHTML('{"roto": ').includes("⚠️"));
    });

    // --- v2.9: JSONPath en el árbol JSON ---
    test("buildTreeHTML: claves JSON con ruta JSONPath (objetos y arrays)", () => {
      const t = X.buildTreeHTML('{"tienda": {"libros": [{"titulo": "x"}]}}');
      assertTrue(t.includes('data-xp="$.tienda"'), "sin ruta raíz: " + t);
      assertTrue(t.includes('data-xp="$.tienda.libros[0].titulo"'), "sin ruta anidada con índice: " + t);
    });

    // --- v2.9: compartir documento por URL (gzip nativo) ---
    test("gzipB64/gunzipB64: roundtrip con unicode", async () => {
      const original = '<a título="canción">😀 ñandú &amp; más</a>';
      const back = await X.gunzipB64(await X.gzipB64(original));
      assertEq(back, original);
    });

    test("gzipB64: produce base64url (sin +, / ni =)", async () => {
      const payload = await X.gzipB64("<root>" + "dato ".repeat(100) + "</root>");
      assertTrue(!/[+/=]/.test(payload), "caracteres no aptos para URL: " + payload.slice(0, 40));
    });

    // --- v2.10: formateo SQL ---
    test("formatSQL: SELECT básico con cláusulas en líneas", () => {
      assertEq(
        X.formatSQL("select a, b from t where x=1 and y=2"),
        "SELECT a,\n  b\nFROM t\nWHERE x = 1\n  AND y = 2"
      );
    });

    test("formatSQL: subconsulta indentada por paréntesis", () => {
      const out = X.formatSQL("select * from (select id from users) u");
      assertTrue(out.includes("FROM (\n  SELECT id"), out);
    });

    test("formatSQL: mayúsculas de keywords opcionales", () => {
      assertTrue(X.formatSQL("select a from t").startsWith("SELECT"));
      assertTrue(X.formatSQL("select a from t", "  ", false).startsWith("select"));
    });

    test("formatSQL: strings intactos aunque contengan keywords y comillas escapadas", () => {
      const out = X.formatSQL("select 'where o''brien from x' as s from t");
      assertTrue(out.includes("'where o''brien from x'"), out);
      assertEq((out.match(/\nFROM/g) || []).length, 1, "un solo FROM real debe romper línea: " + out);
    });

    test("formatSQL: BETWEEN x AND y no se rompe", () => {
      const out = X.formatSQL("select a from t where b between 1 and 5 and c=2");
      assertTrue(out.includes("BETWEEN 1 AND 5"), out);
      assertTrue(out.includes("\n  AND c = 2"), out);
    });

    test("formatSQL: comentarios preservados", () => {
      const out = X.formatSQL("select a -- comentario\nfrom t /* bloque */ where x=1");
      assertTrue(out.includes("-- comentario"), out);
      assertTrue(out.includes("/* bloque */"), out);
    });

    test("formatSQL: funciones pegadas al paréntesis, cláusulas con espacio", () => {
      const out = X.formatSQL("select count(id) from t where a in (1,2)");
      assertTrue(out.includes("COUNT(id)"), out);
      assertTrue(out.includes("IN (1, 2)"), out);
    });

    test("minifySQL: compacta a una línea y convierte -- a /* */", () => {
      const out = X.minifySQL("select a, -- nota\n  b\nfrom t");
      assertTrue(!out.includes("\n"), "quedaron saltos: " + out);
      assertTrue(out.includes("/* nota */"), out);
      assertEq(X.minifySQL("select a from t where x = 1"), "select a from t where x = 1");
    });

    test("minifySQL: dropComments elimina comentarios", () => {
      assertEq(X.minifySQL("select a -- fuera\nfrom t", true), "select a from t");
    });

    test("highlightSQL: keywords, strings, números y comentarios con clases", () => {
      const h = X.highlightSQL("SELECT nombre FROM t WHERE edad > 30 -- filtro\nAND ciudad = 'Madrid'");
      assertTrue(h.includes('<span class="tag">SELECT</span>'), h.slice(0, 200));
      assertTrue(h.includes("'Madrid'</span>"), h);
      assertTrue(h.includes('<span class="attr">30</span>'), h);
      assertTrue(h.includes('class="comment"'), h);
    });

    test("isSQL: detecta sentencias y no confunde XML/JSON", () => {
      assertTrue(X.isSQL("SELECT * FROM t"));
      assertTrue(X.isSQL("  with cte as (select 1) select * from cte"));
      assertTrue(!X.isSQL("<select/>"));
      assertTrue(!X.isSQL('{"select": 1}'));
    });

    // --- v2.5: XPath ---
    const XP_DOC = '<lib><b id="1"><t>A</t></b><b id="2"><t>B</t></b><c/></lib>';

    test("xpathQuery: //tag devuelve los nodos serializados", () => {
      const r = X.xpathQuery(XP_DOC, "//b");
      assertEq(r.length, 2);
      assertTrue(r[0].includes('id="1"'), "primer nodo incorrecto: " + r[0]);
    });

    test("xpathQuery: predicado por atributo", () => {
      const r = X.xpathQuery(XP_DOC, "//b[@id='2']/t");
      assertEq(r.length, 1);
      assertEq(r[0], "<t>B</t>");
    });

    test("xpathQuery: count() devuelve un escalar numérico", () => {
      const r = X.xpathQuery(XP_DOC, "count(//b)");
      assertEq(r.length, 1);
      assertEq(r[0], "2");
    });

    test("xpathQuery: selección de atributos como name=\"valor\"", () => {
      const r = X.xpathQuery(XP_DOC, "//b/@id");
      assertEq(r.join(","), 'id="1",id="2"');
    });

    test("xpathQuery: text() devuelve el texto plano", () => {
      const r = X.xpathQuery(XP_DOC, "//b[1]/t/text()");
      assertEq(r[0], "A");
    });

    test("xpathQuery: expresión inválida lanza error descriptivo", () => {
      assertThrows(() => X.xpathQuery(XP_DOC, "///***"), /XPath inválida/i);
    });

    // --- v2.5: XML → CSV ---
    test("xmlToCsv: tabula el elemento repetido dominante", () => {
      const csv = X.xmlToCsv('<rows><r id="1"><n>Ana</n><e>30</e></r><r id="2"><n>Luis</n><e>25</e></r></rows>');
      const lines = csv.split("\n");
      assertEq(lines[0], "@id,n,e");
      assertEq(lines[1], "1,Ana,30");
      assertEq(lines[2], "2,Luis,25");
    });

    test("xmlToCsv: escapa comas y comillas según RFC 4180", () => {
      const csv = X.xmlToCsv('<l><i><v>a,b</v></i><i><v>di"jo</v></i></l>');
      const lines = csv.split("\n");
      assertEq(lines[1], '"a,b"');
      assertEq(lines[2], '"di""jo"');
    });

    test("xmlToCsv: columnas desalineadas entre filas quedan vacías", () => {
      const csv = X.xmlToCsv('<l><i><a>1</a></i><i><b>2</b></i></l>');
      const lines = csv.split("\n");
      assertEq(lines[0], "a,b");
      assertEq(lines[1], "1,");
      assertEq(lines[2], ",2");
    });

    test("xmlToCsv: sin elemento repetido lanza error claro", () => {
      assertThrows(() => X.xmlToCsv("<a><b>x</b></a>"), /repetido/i);
    });

    // --- v2.5: opciones de formato extra ---
    test("prettyFormat: sortAttrs ordena los atributos alfabéticamente", () => {
      assertEq(X.prettyFormat('<a z="1" b="2" m="3"/>', "  ", false, true), '<a b="2" m="3" z="1"/>\n');
    });

    test("minify: sortAttrs ordena los atributos alfabéticamente", () => {
      assertEq(
        X.minify('<a z="1" b="2"/>', { keepTextWS: true, compactAttrs: true, sortAttrs: true }),
        '<a b="2" z="1"/>'
      );
    });

    test("minify: dropComments elimina los comentarios", () => {
      assertEq(
        X.minify("<a><!-- fuera --><b>x</b></a>", { keepTextWS: true, compactAttrs: true, dropComments: true }),
        "<a><b>x</b></a>"
      );
    });

    test("minify: sin dropComments los comentarios se conservan", () => {
      assertEq(
        X.minify("<a><!-- ok --><b>x</b></a>", { keepTextWS: true, compactAttrs: true }),
        "<a><!-- ok --><b>x</b></a>"
      );
    });

    // --- v2.6: diff semántico ---
    test("diffXML: documentos equivalentes con distinto orden de atributos y espacios → sin diferencias", () => {
      const a = '<r>\n  <e b="2" a="1">  hola   mundo </e>\n</r>';
      const b = '<r><e a="1" b="2">hola mundo</e></r>';
      assertEq(X.diffXML(a, b).length, 0);
    });

    test("diffXML: atributo modificado con ruta y valores", () => {
      const d = X.diffXML('<r><e id="1"/></r>', '<r><e id="2"/></r>');
      assertEq(d.length, 1);
      assertTrue(d[0].includes("✏️") && d[0].includes("/r/e/@id") && d[0].includes('"1" → "2"'), d[0]);
    });

    test("diffXML: atributo añadido y eliminado", () => {
      const d = X.diffXML('<r a="1"/>', '<r b="2"/>');
      assertEq(d.length, 2);
      assertTrue(d.some(l => l.startsWith("➖") && l.includes("/@a")), "falta eliminado: " + d.join(" | "));
      assertTrue(d.some(l => l.startsWith("➕") && l.includes("/@b")), "falta añadido: " + d.join(" | "));
    });

    test("diffXML: texto modificado", () => {
      const d = X.diffXML("<r><t>uno</t></r>", "<r><t>dos</t></r>");
      assertEq(d.length, 1);
      assertTrue(d[0].includes('"uno" → "dos"'), d[0]);
    });

    test("diffXML: elemento añadido en B (hermanos repetidos)", () => {

  // ============================================================
  // Runner
  // ============================================================
  async function runAll(){
    const table = document.getElementById("results");
    let passed = 0;
    for (const t of tests){
      const row = table.insertRow();
      const status = row.insertCell();
      const name = row.insertCell();
      name.textContent = t.name;
      try {
        await t.fn();
        status.innerHTML = '<span class="pass">✅</span>';
        passed++;
      } catch(e){
        status.innerHTML = '<span class="fail">❌</span>';
        const err = document.createElement("div");
        err.className = "err";
        err.textContent = e.message;
        name.appendChild(err);
      }
    }
    const summary = document.getElementById("summary");
    const allOk = passed === tests.length;
    summary.className = allOk ? "ok" : "fail";
    summary.textContent = allOk
      ? `✅ ${passed}/${tests.length} tests pasaron`
      : `❌ ${passed}/${tests.length} tests pasaron — ${tests.length - passed} fallaron`;
  }

  function start(){
    const frame = document.getElementById("app");
    let X = null, idoc = null;
    try {
      X = frame.contentWindow.XMLShield;
      idoc = frame.contentWindow.document;
    } catch(e){ /* acceso bloqueado (file://) */ }

    if (!X){
      const summary = document.getElementById("summary");
      summary.className = "fail";
      summary.textContent = "❌ No se pudo acceder a index.html — sirve la carpeta por HTTP: python -m http.server";
      return;
    }

    // Configuración determinista para los tests que leen controles del DOM
    idoc.getElementById("indent").value = "2";
    idoc.getElementById("tabs").checked = false;
    frame.contentWindow.localStorage.removeItem("xmlshield-prefs");

    defineTests(X, idoc, frame.contentWindow);
    runAll();
  }

  const frame = document.getElementById("app");
  if (frame.contentDocument && frame.contentDocument.readyState === "complete" && frame.contentWindow.XMLShield) {
    start();
  } else {
    frame.addEventListener("load", start);
  }
})();
